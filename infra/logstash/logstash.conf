input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Log từ Kong gateway (có field "service")
  if [service] {
    mutate {
      add_field => { "source" => "kong" }
      add_field => { "service_name" => "%{[service][name]}" }
    }
  }

  # Log từ microservices (có field "app_name" từ logback)
  if [app_name] {
    mutate {
      add_field => { "source" => "microservice" }
      add_field => { "service_name" => "%{[app_name]}" }
    }
  }

  # Fallback nếu không match
  if ![source] {
    mutate {
      add_field => { "source" => "unknown" }
      add_field => { "service_name" => "unknown" }
    }
  }
}

output {
  # Tách index theo source và service_name
  if [source] == "kong" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "kong-%{+YYYY.MM.dd}"
    }
  } else if [app_name] == "identity-service" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "identity-service-%{+YYYY.MM.dd}"
    }
  } else if [app_name] == "voucher-service" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "voucher-service-%{+YYYY.MM.dd}"
    }
  } else if [app_name] == "customer-service" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "customer-service-%{+YYYY.MM.dd}"
    }
  } else if [app_name] == "loyalty-service" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "loyalty-service-%{+YYYY.MM.dd}"
    }
  } else if [app_name] == "notification-service" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "notification-service-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "other-logs-%{+YYYY.MM.dd}"
    }
  }
}
