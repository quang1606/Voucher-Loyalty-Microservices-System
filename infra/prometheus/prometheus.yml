global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8100']

  - job_name: 'identity-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['identity-service:8081']

  - job_name: 'voucher-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['voucher-service:8082']
