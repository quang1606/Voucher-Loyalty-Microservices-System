syntax = "proto3";

package base;

option java_package = "vn.com.grpc.base.entity";
option java_multiple_files = true;

enum AuthorizationType {
  NO_AUTH = 0;
  API_KEY = 1;
  SIGNATURE = 2;
  JWT_TOKEN = 3;
}

message RequestInfo {
  string requestId = 1;
  int64 requestTime = 2;
  string service_id = 3;
  string authorization_value = 4;
  AuthorizationType authorization_type = 5;
}

message BaseRequest {
  string request_id = 1;
  int64 timestamp = 2;
}




