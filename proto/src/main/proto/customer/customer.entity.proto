syntax = "proto3";

package customer;

import "base/base.request.proto";
import "base/base.response.proto";

option java_package = "vn.com.grpc.customer.entity";
option java_multiple_files = true;

message CreateCustomerProfileRequest {
  base.RequestInfo requestInfo = 1;
  string user_id = 2;
  string full_name = 3;
}

message CreateCustomerProfileResponse {
  base.ResponseInfo responseInfo = 1;
}

message GetVoucherUsageStatsRequest {
  base.RequestInfo requestInfo = 1;
  repeated string request_ids = 2;
  int32 month = 3;
  int32 year = 4;
  string request_id_filter = 5;
}

message VoucherUsageStatsItem {
  string request_id = 1;
  int64 used_count = 2;
  string total_discount_amount = 3;
  string voucher_code = 4;
  string voucher_name = 5;
}

message GetVoucherUsageStatsResponse {
  base.ResponseInfo responseInfo = 1;
  repeated VoucherUsageStatsItem stats = 2;
}
