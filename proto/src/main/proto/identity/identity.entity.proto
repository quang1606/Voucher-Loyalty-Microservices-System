syntax = "proto3";

package identity;

import "base/base.request.proto";
import "base/base.response.proto";

option java_package = "vn.com.grpc.identity.entity";
option java_multiple_files = true;

message IdentityRequest {
  base.RequestInfo requestInfo = 1;
  string partner_id = 2;
}

message IdentityResponse {
  base.ResponseInfo responseInfo = 1;
  string name_store = 2;
}

message CheckNameStoreRequest {
  base.RequestInfo requestInfo = 1;
  string name_store = 2;
}

message CheckNameStoreResponse {
  base.ResponseInfo responseInfo = 1;
  bool exists = 2;
}

message GetPartnerRequest {
  base.RequestInfo requestInfo = 1;
  string user_id = 2;
}

message GetPartnerResponse {
  base.ResponseInfo responseInfo = 1;
  int64 id = 2;
  string user_id = 3;
  string store_name = 4;
  string phone = 5;
  string category = 6;
  string total_revenue = 7;
  string status = 8;
  string created_by = 9;
  string created_at = 10;
  string updated_at = 11;
}