syntax = "proto3";

package identity;

import "identity/identity.entity.proto";

option java_package = "vn.com.grpc.identity.service";
option java_multiple_files = true;

service IdentityService {
  rpc GetIdentity(IdentityRequest) returns (IdentityResponse);
  rpc CheckNameStore(CheckNameStoreRequest) returns (CheckNameStoreResponse);
  rpc GetPartner(GetPartnerRequest) returns (GetPartnerResponse);
}