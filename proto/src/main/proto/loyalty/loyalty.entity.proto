syntax = "proto3";

package loyalty;

import "base/base.request.proto";
import "base/base.response.proto";

option java_package = "vn.com.grpc.loyalty.entity";
option java_multiple_files = true;

enum // Thay đổi từ:
RewardType {
  REWARD_TYPE_UNSPECIFIED = 0;
  POINT = 1;
  VOUCHER = 2;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  CANCELLED = 1;
  PENDING_APPROVE = 2;
  INIT = 3;
  APPROVED = 4;
  REJECTED = 5;
  FAILED = 6;
  FINISH = 7;
}

message CreateMissionRequestGrpc {
  base.RequestInfo requestInfo = 1;
  string mission_name = 2;
  string mission_description = 3;
  double target_value = 4;
  RewardType reward_type = 5;
  string reward_value = 6;
  int64 partner_id = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  TaskStatus task_status = 10;
}

message CreateMissionResponseGrpc {
  base.ResponseInfo responseInfo = 1;
}

message GetMissionByIdRequest {
  base.RequestInfo requestInfo = 1;
  int64 mission_id = 2;
}

message GetMissionByIdResponse {
  base.ResponseInfo responseInfo = 1;
  string mission_name = 2;
  string mission_description = 3;
  double target_value = 4;
  RewardType reward_type = 5;
  string reward_value = 6;
  int64 partner_id = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  TaskStatus task_status = 10;
  string request_id=11;
}

message SearchMissionRequest {
  base.RequestInfo requestInfo = 1;
  string nameStore = 2;
  RewardType reward_type = 3;
  TaskStatus task_status = 4;
  Pageable pageable = 5;
}
message Pageable {
  int32 page = 1;
  int32 size = 2;
  string sort = 3;
}

message SearchMissionResponse {
  base.ResponseInfo responseInfo = 1;
  repeated MissionInfo missions = 2;
  int32 total_elements = 3;
  int32 total_pages = 4;
}

message MissionInfo {
  int64 mission_id = 1;
  string mission_name = 2;
  string mission_description = 3;
  double target_value = 4;
  RewardType reward_type = 5;
  string reward_value = 6;
  int64 partner_id = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  TaskStatus task_status = 10;
  string request_id=11;

}