syntax = "proto3";

package loyalty;

import "base/base.request.proto";
import "base/base.response.proto";

option java_package = "vn.com.grpc.loyalty.entity";
option java_multiple_files = true;

enum RewardType {
  POINT = 0;
  VOUCHER = 1;
}

enum TaskStatus {
  TASK_CANCELLED = 0;
  TASK_PENDING_APPROVE = 1;
  TASK_INIT = 2;
  TASK_APPROVED = 3;
  TASK_REJECTED = 4;
  TASK_FAILED = 5;
  TASK_FINISH = 6;
}

message CreateMissionRequest {
  base.RequestInfo requestInfo = 1;
  string mission_name = 2;
  string mission_description = 3;
  double target_value = 4;
  RewardType reward_type = 5;
  string reward_value = 6;
  int64 partner_id = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  TaskStatus task_status = 10;
}

message CreateMissionResponse {
  base.ResponseInfo responseInfo = 1;
}

message GetMissionByIdRequest {
  base.RequestInfo requestInfo = 1;
  int64 mission_id = 2;
}

message GetMissionByIdResponse {
  base.ResponseInfo responseInfo = 1;
  string mission_name = 2;
  string mission_description = 3;
  double target_value = 4;
  RewardType reward_type = 5;
  string reward_value = 6;
  int64 partner_id = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  TaskStatus task_status = 10;
}
