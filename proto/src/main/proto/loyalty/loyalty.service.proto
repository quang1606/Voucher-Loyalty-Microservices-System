syntax = "proto3";

package loyalty;

import "loyalty/loyalty.entity.proto";

option java_package = "vn.com.grpc.loyalty.service";
option java_multiple_files = true;

service LoyaltyService {
  rpc CreateMission(CreateMissionRequestGrpc) returns (CreateMissionResponseGrpc);
  rpc GetMissionById(GetMissionByIdRequest) returns (GetMissionByIdResponse);
  rpc SearchMission(SearchMissionRequest) returns (SearchMissionResponse);
}
