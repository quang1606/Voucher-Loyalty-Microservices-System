syntax = "proto3";

package loyalty;

import "loyalty/loyalty.entity.proto";

option java_package = "vn.com.grpc.loyalty.service";
option java_multiple_files = true;

service LoyaltyService {
  rpc CreateMission(CreateMissionRequest) returns (CreateMissionResponse);
  rpc GetMissionById(GetMissionByIdRequest) returns (GetMissionByIdResponse);
}
