syntax = "proto3";

package voucher;

import "base/base.request.proto";
import "base/base.response.proto";

option java_package = "vn.com.grpc.voucher.entity";
option java_multiple_files = true;

message SearchVoucherRequest {
  base.RequestInfo requestInfo = 1;
  string customer_tier = 2;
  VoucherPageable pageable = 3;
}

message VoucherPageable {
  int32 page = 1;
  int32 size = 2;
  string sort = 3;
}

message SearchVoucherResponse {
  base.ResponseInfo responseInfo = 1;
  repeated VoucherInfo vouchers = 2;
  int32 total_elements = 3;
  int32 total_pages = 4;
}

enum DiscountType {
  FIXED = 0;
  PERCENT = 1;
}

enum CreatorType {
  PARTNER = 0;
  SYSTEM = 1;
}

message VoucherInfo {
  int64 id = 1;
  string voucher_code = 2;
  string voucher_name = 3;
  string description = 4;
  string customer_tier = 5;
  DiscountType discount_type = 6;
  string discount_value = 7;
  string max_discount = 8;
  string min_order_value = 9;
  int32 total_stock = 10;
  int32 available_stock = 11;
  int32 max_collect = 12;
  int64 start_date = 13;
  int64 end_date = 14;
  string status = 15;
  int64 created_at = 16;
}

message GetVoucherByRequestIdRequest {
  base.RequestInfo requestInfo = 1;
  string request_id = 2;
}

message GetVoucherByRequestIdResponse {
  base.ResponseInfo responseInfo = 1;
  repeated VoucherDetail voucher_request = 2;
}


message GetVoucherByIdRequest {
  base.RequestInfo requestInfo = 1;
  int64 voucher_id = 2;
}

message GetVoucherByIdResponse {
  base.ResponseInfo responseInfo = 1;
  VoucherDetail voucher = 2;
}

message VoucherDetail {
  int64 id = 1;
  string voucher_code = 2;
  string voucher_name = 3;
  string description = 4;
  string customer_tier = 5;
  DiscountType discount_type = 6;
  string discount_value = 7;
  string max_discount = 8;
  string min_order_value = 9;
  int32 total_stock = 10;
  int32 available_stock = 11;
  int32 max_collect = 12;
  int64 start_date = 13;
  int64 end_date = 14;
  string status = 15;
  string name_store = 16;
  int64 created_at = 17;
  CreatorType creator_type = 18;
  string request_id = 19;
}

message GetMockInvoicesRequest {
  base.RequestInfo requestInfo = 1;
  string name_store = 2;
  string title = 3;
  int32 page = 4;
  int32 size = 5;
}

message GetMockInvoicesResponse {
  base.ResponseInfo responseInfo = 1;
  repeated MockInvoiceInfo invoices = 2;
  int32 total_elements = 3;
  int32 total_pages = 4;
}

message MockInvoiceInfo {
  int64 id = 1;
  string title = 2;
  string name_store = 3;
  string amount = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}