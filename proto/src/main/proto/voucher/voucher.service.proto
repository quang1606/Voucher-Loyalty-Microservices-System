syntax = "proto3";

package voucher;

import "voucher/voucher.entity.proto";

option java_package = "vn.com.grpc.voucher.service";
option java_multiple_files = true;

service VoucherGrpcService {
  rpc SearchVoucher(SearchVoucherRequest) returns (SearchVoucherResponse);
  rpc GetVoucherByRequestId(GetVoucherByRequestIdRequest) returns (GetVoucherByRequestIdResponse);
  rpc GetVoucherById(GetVoucherByIdRequest) returns (GetVoucherByIdResponse);
  rpc GetMockInvoices(GetMockInvoicesRequest) returns (GetMockInvoicesResponse);
}
